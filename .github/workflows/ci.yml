name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality and Android debug build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Bootstrap pinned Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.6'
          channel: stable
          cache: true

      - name: Install FVM
        run: |
          dart pub global activate fvm 4.1.2
          echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"

      - name: Install pinned Flutter SDK
        run: fvm install 3.44.6

      - name: Install dependencies
        run: fvm flutter pub get

      - name: Generate sources
        run: fvm dart run build_runner build --delete-conflicting-outputs

      - name: Verify committed generated sources
        run: git diff --exit-code -- '*.g.dart' '*.freezed.dart'

      - name: Verify formatting
        run: fvm dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: fvm flutter analyze

      - name: Test
        run: fvm flutter test

      - name: Build Android debug APK
        run: fvm flutter build apk --debug
