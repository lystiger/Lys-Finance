name: lys_finance
description: 'A calm, offline-first personal finance companion.'
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  drift: ^2.34.1
  drift_flutter: ^0.3.1
  flutter_local_notifications: ^22.0.1
  flutter_riverpod: ^3.3.2
  flutter_secure_storage: ^10.3.1
  freezed_annotation: ^3.1.0
  go_router: ^17.3.0
  intl: ^0.20.2
  json_annotation: ^4.12.0
  logger: ^2.7.0
  path: ^1.9.1
  path_provider: ^2.1.6
  riverpod_annotation: ^4.0.3
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  build_runner: ^2.15.1
  drift_dev: ^2.34.0
  flutter_lints: ^6.0.0
  # Temporary analyzer-12-compatible release; see docs/architecture.md.
  freezed: ^3.2.6-dev.1
  json_serializable: ^6.14.0
  mocktail: ^1.0.5
  riverpod_generator: ^4.0.4

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/icons/
    - assets/images/
